services:
  xarm6_sim:
    build:
      context: .
      dockerfile: Dockerfile
    image: xarm6_sim:latest
    platform: linux/arm64
    privileged: true
    stdin_open: true
    tty: true
    shm_size: 512mb
    ports:
      - "6080:6080"
      - "5900:5900"
    volumes:
      - ./src:/home/ws/src:rw
      - ./build:/home/ws/build:rw
      - ./install:/home/ws/install:rw
      - ./log:/home/ws/log:rw
    working_dir: /home/ws
    environment:
      - DISPLAY=:1
      - LIBGL_ALWAYS_SOFTWARE=1
      - GALLIUM_DRIVER=llvmpipe
      - MESA_GL_VERSION_OVERRIDE=3.3
      - MESA_GLSL_VERSION_OVERRIDE=330
      - OGRE_RTT_MODE=Copy
      - LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libatomic.so.1
      - ROS_LOCALHOST_ONLY=1
      - ROS_DOMAIN_ID=42
